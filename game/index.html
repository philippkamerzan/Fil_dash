<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10131f" />
    <title>FIL Dash</title>
    <link rel="stylesheet" href="./styles.css?v=11" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="game-shell">
      <canvas id="space3d" class="space3d-layer" aria-hidden="true"></canvas>
      <canvas id="game" aria-label="FIL Dash"></canvas>
      <div class="hud" aria-live="polite">
        <div class="brand">FIL Dash</div>
        <div id="levelName" class="level-pill">L1</div>
        <div class="hud-stat">Попытки <span id="attempts">0</span></div>
        <div class="hud-stat record-stat">Рекорд <span id="bestTime">--</span></div>
        <div class="hud-stat coins-stat">Монеты <span id="coinsCount">0</span></div>
        <div id="sectionName" class="section-pill">Разгон</div>
        <button id="soundToggle" class="icon-button" type="button" aria-label="Звук">♪</button>
        <button id="pauseToggle" class="icon-button" type="button" aria-label="Пауза">Ⅱ</button>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div id="progressFill"></div>
      </div>
      <div id="pauseOverlay" class="pause-overlay hidden" aria-hidden="true">
        <div class="pause-mark">Ⅱ</div>
        <div class="pause-title">Пауза</div>
      </div>
      <div id="overlay" class="overlay">
        <div class="overlay-title">FIL Dash</div>
        <div id="levelPicker" class="level-picker" aria-label="Выбор уровня"></div>
        <div id="resultsPanel" class="results-panel">
          <div class="result-grid">
            <div><span>Результат</span><b id="lastResult">--</b></div>
            <div><span>Рекорд</span><b id="bestResult">--</b></div>
            <div><span>Место</span><b id="rankResult">--</b></div>
            <div><span>Награда</span><b id="rewardResult">--</b></div>
          </div>
          <section class="shop-panel">
            <h2>Скины</h2>
            <div id="skinShop" class="skin-shop"></div>
          </section>
          <div class="leaderboards">
            <section>
              <h2>Личный топ</h2>
              <ol id="localLeaderboard" class="leaderboard-list"></ol>
            </section>
            <section>
              <h2>Общий топ</h2>
              <ol id="globalLeaderboard" class="leaderboard-list"></ol>
            </section>
          </div>
        </div>
        <button id="startButton" class="primary-button" type="button">Старт</button>
      </div>
      <div class="touch-controls" aria-label="Управление">
        <div class="touch-right">
          <button data-control="jump" class="touch-button jump" type="button" aria-label="Прыжок">▲</button>
        </div>
      </div>
    </main>
    <script type="module" src="./src/game.js?v=154"></script>
  </body>
</html>
