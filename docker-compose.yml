services:
  game:
    build:
      context: .
    image: fil-dash:local
    environment:
      HOST: 0.0.0.0
      PORT: 5178
    ports:
      - "5178:5178"
    volumes:
      - fil_dash_data:/app/game/data
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
    image: fil-dash:local
    command: ["node", "telegram/supervisor.mjs"]
    profiles: ["telegram"]
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      PUBLIC_GAME_URL: ${PUBLIC_GAME_URL:-}
      GAME_ORIGIN: http://game:5178
      START_LEVEL: 1
      CHECK_SECONDS: 30
      CLOUDFLARED_PROTOCOL: http2
      TUNNEL_STABLE_CHECKS: 2
      TUNNEL_STABLE_GAP_SECONDS: 8
    depends_on:
      - game
    restart: unless-stopped

  telegram-publish:
    build:
      context: .
    image: fil-dash:local
    command: ["node", "telegram/publish.mjs"]
    profiles: ["publish"]
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      PUBLIC_GAME_URL: ${PUBLIC_GAME_URL:-}
    restart: "no"

volumes:
  fil_dash_data:
